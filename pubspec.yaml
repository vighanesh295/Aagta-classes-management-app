name: aagte_classes
description: Aagte Classes - Premium Coaching Institute Management App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Supabase Backend
  supabase_flutter: ^2.5.4
  flutter_local_notifications: ^17.2.2
  firebase_messaging: ^14.9.4
  firebase_core: ^2.27.1

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.1.2
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0
  file_picker: ^8.0.7
  image_picker: ^1.1.2
  permission_handler: ^11.3.1
  uuid: ^4.4.0
  equatable: ^2.0.5
  connectivity_plus: ^6.0.3

  # Pin flutter_plugin_android_lifecycle below 2.0.24 — that version added
  # minCompileSdk=36 to the AAR metadata which breaks file_picker v8 (SDK 34).
  flutter_plugin_android_lifecycle: ">=2.0.0 <2.0.24"

  cupertino_icons: ^1.0.6
  open_filex: ^4.7.0
  path_provider: ^2.1.6
  dio: ^5.10.0
  mime: ^2.0.0
  excel: ^4.0.2
  printing: ^5.12.0
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  remove_alpha_ios: true
  min_sdk_android: 21